const luaCheatSheet = `Lua Builder Cheat Sheet

1. Variables (store data)

local name = "John"
local coins = 50

Change values:

coins = coins + 10

--------------------------------------------------

2. Print text

print("Hello")
print("Coins: " .. coins)

Use ".." to join text.

--------------------------------------------------

3. Maths symbols

Division: ÷
Addition: +
Subtraction: -
Square Root: √
Cube Root: ∛

--------------------------------------------------

4. Ask the player a question

print("What is your name?")

local answer = io.read()

print("Hello " .. answer)

Numbers:

local amount = tonumber(io.read())

--------------------------------------------------

5. If Statements

if answer == "1" then
    print("Correct!")
else
    print("No")
end

Question Example:

print("What is 5 + 5?")

local answer = io.read()

if answer == "10" then
    print("Correct!")
else
    print("Wrong answer")
end

--------------------------------------------------

6. Functions

function greet(name)
    print("Hello " .. name)
end

greet("John")

Function with return:

function takeDamage(health)
    return health - 20
end

local health = 100

health = takeDamage(health)

--------------------------------------------------

7. Tables

local player = {
    name = "Bob",
    coins = 50
}

Get values:

print(player.name)

Change values:

player.coins = 100

--------------------------------------------------

8. Nested Tables

local player = {
    stats = {
        health = 100,
        level = 1
    }
}

print(player.stats.health)

--------------------------------------------------

9. For Loops

for i = 1, 5 do
    print("Hello")
end

With numbers:

for i = 1, 5 do
    print(i)
end

--------------------------------------------------

10. While Loops

local running = true

while running do
    print("Running")

    running = false
end

Exit example:

while true do
    local answer = io.read()

    if answer == "exit" then
        break
    end
end

--------------------------------------------------

11. Wait (Game Lua)

wait(1)

print("Done")

--------------------------------------------------

Mini Debug Checklist

- Missing end?
- Missing commas in tables?
- Using == in if?
- Used ".." to join text?
- Did you call your function?
- Did you save returned values?`;

const cssCheatSheet = `# CSS Cheat Sheet (Lessons 1--27)

## 1. Basic Selectors

h1 {}
p {}

Styles every matching element.

## 2. Classes

.box {}
<div class="box"></div>

Use \`.\` for many elements.

## 3. IDs

#title {}
<h1 id="title"></h1>

Use \`#\` for one unique element.

## 4. Colors

color: red;
background-color: skyblue;
background-color: #87CEEB;

## 5. Fonts

font-family: Arial;
font-size: 24px;
font-weight: bold; /* or 100-900 */

## 6. Text

text-decoration: underline;
text-decoration: line-through;
text-decoration: none;

## 7. Borders

border: 2px solid black;

## 8. Padding & Margin

padding: 20px;
margin: 15px;

## 9. Width & Height

width: 200px;
height: 100px;

## 10. Border Radius

border-radius: 10px;
border-radius: 25px 0 25px 0;
border-radius: 50%;

## 11. Hover

button:hover {

  position: relative;

Higher \`z-index\` appears in front.

## Common Color Names

red, blue, green, purple, orange, black, white, gray, lightblue,

## Quick Reminders

-   \`.\` = Class
-   \`#\` = ID
-   End CSS properties with \`;\`
-   Put visible HTML inside <body>...</body>

function download(filename, text) {
    const element = document.createElement("a");
    const file = new Blob([text], {type: "text/plain"});
    element.href = URL.createObjectURL(file);
    element.download = filename;
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}

function downloadPython() {
    download("Python_CheatSheet.txt", pythonCheatSheet);
}

function downloadLua() {
    download("Lua_CheatSheet.txt", luaCheatSheet);
}

function downloadCSS() {
    download("CSS_CheatSheet.txt", cssCheatSheet);
}
